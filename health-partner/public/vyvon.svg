<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="vyvon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" /> <!-- Purple 600 -->
      <stop offset="100%" stop-color="#2dd4bf" /> <!-- Teal 400 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#vyvon-gradient)" filter="url(#shadow)"/>
  
  <text 
    x="50%" 
    y="56%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="340" 
    font-weight="900" 
    font-style="italic" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-10">V</text>
    
  <!-- Small dot for the "health" accent -->
  <circle cx="360" cy="180" r="28" fill="#ffffff" opacity="0.9"/>
</svg>
